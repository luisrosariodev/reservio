{% extends "base.html" %}
{% block title %}Reset password · Reserv.io{% endblock %}

{% block body %}
<div class="page-center">
  <div class="card auth-card">
    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-hint">We’ll email you a link to set a new password.</p>

    <form method="post">
      {% csrf_token %}

      <div class="field">
        <label for="id_email">Email</label>
        {{ form.email }}
      </div>

      <button type="submit" class="btn btn-primary full">
        Send reset link
      </button>
    </form>

    <div class="auth-footer">
      <a href="/accounts/login/">Back to sign in</a>
    </div>
  </div>
</div>
{% endblock %}
