{% extends "base.html" %}
{% load static %}
{% block title %}Contraseña actualizada · Reserv.io{% endblock %}

{% block head %}
  <link rel="stylesheet" href="{% static 'css/pages/auth.css' %}">
{% endblock %}

{% block main %}
<div class="page-center">
  <div class="card rio-auth-card">
    <h1 class="rio-auth-title">Contraseña actualizada</h1>
    <p class="rio-auth-subtitle">
      Tu contraseña se cambió correctamente. Ya puedes iniciar sesión.
    </p>

    <div class="rio-actions">
      <a class="btn btn-primary" href="{% url 'login' %}">Iniciar sesión</a>
    </div>
  </div>
</div>
{% endblock %}
